<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주문 현황</title>
    <style>
        :root {
            --bg: #f5efe6;
            --panel: rgba(255, 252, 247, 0.88);
            --ink: #1f2937;
            --muted: #6b7280;
            --line: rgba(148, 163, 184, 0.24);
            --accent: #c2410c;
            --accent-soft: #ffedd5;
            --waiting: #f59e0b;
            --delivering: #2563eb;
            --completed: #059669;
            --shadow: 0 22px 60px rgba(148, 163, 184, 0.18);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", "Malgun Gothic", sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at top left, rgba(194, 65, 12, 0.18), transparent 28%),
                radial-gradient(circle at top right, rgba(37, 99, 235, 0.14), transparent 30%),
                linear-gradient(180deg, #fff9f1 0%, var(--bg) 100%);
        }

        .shell {
            max-width: 1180px;
            margin: 0 auto;
            padding: 40px 20px 60px;
        }

        .hero {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            align-items: flex-end;
            margin-bottom: 28px;
        }

        .hero h1 {
            margin: 0;
            font-size: clamp(2rem, 5vw, 3.2rem);
            letter-spacing: -0.04em;
        }

        .hero p {
            margin: 10px 0 0;
            color: var(--muted);
            font-size: 1rem;
        }

        .actions {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .chip,
        button {
            border: 0;
            border-radius: 999px;
            padding: 12px 18px;
            font-size: 0.95rem;
        }

        .chip {
            background: rgba(255, 255, 255, 0.72);
            color: var(--muted);
            border: 1px solid var(--line);
        }

        button {
            cursor: pointer;
            background: linear-gradient(135deg, #ea580c, #c2410c);
            color: white;
            box-shadow: 0 16px 28px rgba(194, 65, 12, 0.22);
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 18px 32px rgba(194, 65, 12, 0.3);
        }

        button:disabled {
            cursor: wait;
            opacity: 0.68;
            transform: none;
            box-shadow: none;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 16px;
            margin-bottom: 22px;
        }

        .card,
        .panel {
            background: var(--panel);
            border: 1px solid rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(14px);
            box-shadow: var(--shadow);
        }

        .card {
            border-radius: 24px;
            padding: 20px;
        }

        .card .label {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--muted);
            font-size: 0.92rem;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }

        .card .value {
            margin-top: 16px;
            font-size: clamp(1.8rem, 4vw, 2.5rem);
            font-weight: 700;
            letter-spacing: -0.04em;
        }

        .panel {
            border-radius: 28px;
            padding: 24px;
            overflow: hidden;
        }

        .panel-head {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            align-items: center;
            margin-bottom: 18px;
        }

        .panel-head h2 {
            margin: 0;
            font-size: 1.3rem;
        }

        .panel-head p {
            margin: 6px 0 0;
            color: var(--muted);
            font-size: 0.95rem;
        }

        .robot-location {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            align-items: center;
            margin-bottom: 22px;
            padding: 18px 20px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.72);
        }

        .robot-location .label {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--muted);
            font-size: 0.92rem;
        }

        .robot-location .value {
            margin-top: 8px;
            font-size: 1.05rem;
            font-weight: 700;
        }

        .table-wrap {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 860px;
        }

        th,
        td {
            padding: 16px 14px;
            text-align: left;
            border-bottom: 1px solid var(--line);
            font-size: 0.95rem;
            vertical-align: top;
        }

        th {
            color: var(--muted);
            font-weight: 600;
            font-size: 0.88rem;
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 92px;
            padding: 8px 12px;
            border-radius: 999px;
            font-size: 0.82rem;
            font-weight: 700;
        }

        .status-waiting {
            color: #92400e;
            background: rgba(245, 158, 11, 0.14);
        }

        .status-delivering {
            color: #1d4ed8;
            background: rgba(37, 99, 235, 0.12);
        }

        .status-completed {
            color: #047857;
            background: rgba(5, 150, 105, 0.14);
        }

        .muted {
            color: var(--muted);
        }

        .empty {
            padding: 48px 24px;
            text-align: center;
            color: var(--muted);
            background: rgba(255, 255, 255, 0.5);
            border-radius: 18px;
        }

        .items {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .action-button {
            width: 100%;
            max-width: 124px;
            padding: 10px 14px;
            font-size: 0.84rem;
            box-shadow: none;
        }

        .action-button.secondary {
            background: rgba(255, 255, 255, 0.96);
            color: var(--ink);
            border: 1px solid var(--line);
        }

        .action-button.secondary:hover {
            box-shadow: none;
        }

        .action-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .action-text {
            display: inline-block;
            color: var(--muted);
            font-size: 0.88rem;
            font-weight: 600;
        }

        .feedback {
            display: none;
            margin-bottom: 16px;
            padding: 14px 16px;
            border-radius: 16px;
            font-size: 0.94rem;
            font-weight: 600;
        }

        .feedback.show {
            display: block;
        }

        .feedback.info {
            color: #1d4ed8;
            background: rgba(37, 99, 235, 0.1);
            border: 1px solid rgba(37, 99, 235, 0.16);
        }

        .feedback.success {
            color: #065f46;
            background: rgba(16, 185, 129, 0.12);
            border: 1px solid rgba(16, 185, 129, 0.18);
        }

        .feedback.error {
            color: #b91c1c;
            background: rgba(239, 68, 68, 0.12);
            border: 1px solid rgba(239, 68, 68, 0.18);
        }

        @media (max-width: 900px) {
            .hero {
                flex-direction: column;
                align-items: stretch;
            }

            .stats {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .robot-location {
                align-items: flex-start;
                flex-direction: column;
            }
        }

        @media (max-width: 640px) {
            .shell {
                padding: 26px 14px 40px;
            }

            .stats {
                grid-template-columns: 1fr;
            }

            .panel {
                padding: 18px;
            }
        }
    </style>
</head>
<body>
<main class="shell">
    <section class="hero">
        <div>
            <h1>주문 현황</h1>
            <p>모바일 앱 주문과 관리자 주문을 한 화면에서 빠르게 확인할 수 있습니다.</p>
        </div>
        <div class="actions">
            <div class="chip" id="last-updated">업데이트 대기 중</div>
            <button id="refresh-button" type="button">새로고침</button>
        </div>
    </section>

    <section class="stats">
        <article class="card">
            <div class="label"><span class="dot" style="background: var(--accent);"></span>전체 주문</div>
            <div class="value" id="total-count">0</div>
        </article>
        <article class="card">
            <div class="label"><span class="dot" style="background: var(--waiting);"></span>대기</div>
            <div class="value" id="waiting-count">0</div>
        </article>
        <article class="card">
            <div class="label"><span class="dot" style="background: var(--delivering);"></span>배송 중</div>
            <div class="value" id="delivering-count">0</div>
        </article>
        <article class="card">
            <div class="label"><span class="dot" style="background: var(--completed);"></span>완료</div>
            <div class="value" id="completed-count">0</div>
        </article>
    </section>

    <section class="robot-location">
        <div>
            <div class="label"><span class="dot" style="background: var(--delivering);"></span>로봇 현재 위치</div>
            <div class="value" id="robot-location-text">아직 수신된 위치가 없습니다.</div>
        </div>
        <div class="muted" id="robot-location-updated">위치 업데이트 대기 중</div>
    </section>

    <section class="panel">
        <div class="panel-head">
            <div>
                <h2>최근 주문 목록</h2>
                <p>주문 상태와 금액, 주문 항목을 함께 확인하고 바로 상태를 변경할 수 있습니다.</p>
            </div>
        </div>
        <div id="admin-feedback" class="feedback"></div>
        <div id="content"></div>
    </section>
</main>

<script>
    const statusLabels = {
        WAITING: "대기",
        DELIVERING: "배송 중",
        COMPLETED: "완료"
    };

    const sourceLabels = {
        MOBILE_APP: "모바일 앱",
        ADMIN: "관리자"
    };

    const statusClasses = {
        WAITING: "status-waiting",
        DELIVERING: "status-delivering",
        COMPLETED: "status-completed"
    };

    const statusActions = {
        WAITING: [
            {
                status: "DELIVERING",
                label: "배송 시작",
                tone: "primary"
            }
        ],
        DELIVERING: [
            {
                status: "WAITING",
                label: "대기로 되돌리기",
                tone: "secondary"
            },
            {
                status: "COMPLETED",
                label: "완료 처리",
                tone: "primary"
            }
        ],
        COMPLETED: [
            {
                status: "DELIVERING",
                label: "배송 중으로 되돌리기",
                tone: "secondary"
            }
        ]
    };

    const currency = new Intl.NumberFormat("ko-KR");
    const updatingOrders = new Set();

    async function loadOrders() {
        const content = document.getElementById("content");
        const refreshButton = document.getElementById("refresh-button");

        refreshButton.disabled = true;
        refreshButton.textContent = "불러오는 중...";

        try {
            const response = await fetch("/api/admin/orders", {
                headers: {
                    "Accept": "application/json"
                }
            });

            if (!response.ok) {
                throw new Error("주문 정보를 불러오지 못했습니다.");
            }

            const orders = await response.json();
            renderSummary(orders);
            renderTable(orders, content);
            document.getElementById("last-updated").textContent =
                `${new Date().toLocaleString("ko-KR")} 기준`;
        } catch (error) {
            content.innerHTML = `<div class="empty">${error.message}</div>`;
        } finally {
            refreshButton.disabled = false;
            refreshButton.textContent = "새로고침";
        }
    }

    async function loadRobotLocation() {
        const locationText = document.getElementById("robot-location-text");
        const updatedText = document.getElementById("robot-location-updated");

        try {
            const response = await fetch("/api/robot/location", {
                headers: {
                    "Accept": "application/json"
                }
            });

            if (response.status === 404) {
                locationText.textContent = "아직 수신된 위치가 없습니다.";
                updatedText.textContent = "위치 업데이트 대기 중";
                return;
            }

            if (!response.ok) {
                throw new Error("로봇 위치를 불러오지 못했습니다.");
            }

            const location = await response.json();
            locationText.textContent =
                `위도 ${formatCoordinate(location.latitude)}, 경도 ${formatCoordinate(location.longitude)}`;
            updatedText.textContent = `마지막 갱신: ${formatDate(location.updatedAt)}`;
        } catch (error) {
            locationText.textContent = error.message;
            updatedText.textContent = "잠시 후 다시 시도해 주세요.";
        }
    }

    async function refreshDashboard() {
        await Promise.all([
            loadOrders(),
            loadRobotLocation()
        ]);
    }

    function renderSummary(orders) {
        const counts = orders.reduce((acc, order) => {
            acc.total += 1;
            acc[order.status] = (acc[order.status] || 0) + 1;
            return acc;
        }, { total: 0, WAITING: 0, DELIVERING: 0, COMPLETED: 0 });

        document.getElementById("total-count").textContent = counts.total;
        document.getElementById("waiting-count").textContent = counts.WAITING;
        document.getElementById("delivering-count").textContent = counts.DELIVERING;
        document.getElementById("completed-count").textContent = counts.COMPLETED;
    }

    function renderTable(orders, container) {
        if (!orders.length) {
            container.innerHTML = '<div class="empty">아직 등록된 주문이 없습니다.</div>';
            return;
        }

        const rows = orders.map((order) => `
            <tr>
                <td>
                    <strong>${escapeHtml(order.customerName)}</strong>
                    <div class="muted">${escapeHtml(order.phoneNumber)}</div>
                </td>
                <td>${escapeHtml(sourceLabels[order.source] || order.source)}</td>
                <td>
                    <span class="status-pill ${statusClasses[order.status] || ""}">
                        ${statusLabels[order.status] || order.status}
                    </span>
                </td>
                <td>${currency.format(order.totalPrice)}원</td>
                <td>${escapeHtml(order.deliveryAddress)}</td>
                <td>
                    <div class="items">
                        ${order.items.map((item) =>
                            `<span>${escapeHtml(item.name)} ${item.quantity}개</span>`
                        ).join("")}
                    </div>
                </td>
                <td>${formatDate(order.createdAt)}</td>
                <td>${renderActionCell(order)}</td>
            </tr>
        `).join("");

        container.innerHTML = `
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>주문자</th>
                            <th>주문 경로</th>
                            <th>상태</th>
                            <th>총 금액</th>
                            <th>배송지</th>
                            <th>주문 항목</th>
                            <th>생성 시각</th>
                            <th>관리</th>
                        </tr>
                    </thead>
                    <tbody>${rows}</tbody>
                </table>
            </div>
        `;

        attachActionHandlers(container);
    }

    function renderActionCell(order) {
        const actions = statusActions[order.status] || [];
        if (!actions.length) {
            return '<span class="action-text">처리 완료</span>';
        }

        const isUpdating = updatingOrders.has(order.id);
        const disabled = isUpdating ? "disabled" : "";
        const buttons = actions.map((action) => {
            const buttonLabel = isUpdating ? "처리 중..." : action.label;
            const className = action.tone === "secondary"
                ? "action-button secondary"
                : "action-button";

            return `
                <button
                    type="button"
                    class="${className}"
                    data-order-id="${order.id}"
                    data-next-status="${action.status}"
                    ${disabled}
                >
                    ${buttonLabel}
                </button>
            `;
        }).join("");

        return `<div class="action-group">${buttons}</div>`;
    }

    function attachActionHandlers(container) {
        container.querySelectorAll(".action-button").forEach((button) => {
            button.addEventListener("click", async () => {
                await updateOrderStatus(button.dataset.orderId, button.dataset.nextStatus);
            });
        });
    }

    async function updateOrderStatus(orderId, nextStatus) {
        if (updatingOrders.has(orderId)) {
            return;
        }

        updatingOrders.add(orderId);
        showFeedback("주문 상태를 변경하는 중입니다.", "info");
        await loadOrders();

        try {
            const response = await fetch(`/api/admin/orders/${orderId}/status`, {
                method: "PATCH",
                headers: {
                    "Content-Type": "application/json",
                    "Accept": "application/json"
                },
                body: JSON.stringify({ status: nextStatus })
            });

            if (!response.ok) {
                let errorMessage = "주문 상태를 변경하지 못했습니다.";

                try {
                    const errorBody = await response.json();
                    if (errorBody && errorBody.message) {
                        errorMessage = errorBody.message;
                    }
                } catch (error) {
                    // Ignore JSON parse errors and use the default message.
                }

                throw new Error(errorMessage);
            }

            const updatedOrder = await response.json();
            showFeedback(`주문 상태가 ${statusLabels[updatedOrder.status] || updatedOrder.status}(으)로 변경되었습니다.`, "success");
        } catch (error) {
            showFeedback(error.message, "error");
        } finally {
            updatingOrders.delete(orderId);
            await refreshDashboard();
        }
    }

    function showFeedback(message, tone = "success") {
        const feedback = document.getElementById("admin-feedback");
        feedback.textContent = message;
        feedback.className = `feedback show ${tone}`;
    }

    function formatDate(value) {
        if (!value) {
            return "-";
        }

        return new Date(value).toLocaleString("ko-KR");
    }

    function formatCoordinate(value) {
        return Number(value).toFixed(6);
    }

    function escapeHtml(value) {
        return String(value ?? "")
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#39;");
    }

    document.getElementById("refresh-button").addEventListener("click", refreshDashboard);
    refreshDashboard();
    setInterval(refreshDashboard, 10000);
</script>
</body>
</html>
